<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <main class="card">
    <section class="perfume-pic">
      <img class="mobile-pic" src="images/image-product-mobile.jpg" alt="Gabrielle Essence Eau De Parfum">
      <img class="desktop-pic" src="images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum">
    </section>
    <section class="perfume-details">
      <p class="perfume-title">Perfume</p>
      <h1 class="perfume-name">Gabrielle Essence Eau De Parfum</h1>
      <p class="perfume-description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>
      
      <div class="price-container">
        <span class="discount">$149.99</span>
        <span class="price">$169.99</span>
      </div>

      <button class="cart">
        <img class="icon-cart" src="images/icon-cart.svg" alt="">
        <span>Add to Cart</span>
      </button>
    </section>
  </main>
</body>
</html>
